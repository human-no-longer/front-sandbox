<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">
        <div class="group">
          <div class="group-item">A</div>
          <div class="group-item">♠</div>
        </div>
      </div>
      <div class="middle">
        <div class="group-vertical">
          <div class="group-item">♠</div>
        </div>
      </div>
      <div class="right flipped">
        <div class="group">
          <div class="group-item">A</div>
          <div class="group-item">♠</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="left">
        <div class="group">
          <div class="group-item">2</div>
          <div class="group-item">♣</div>
        </div>
      </div>
      <div class="middle">
        <div class="group-vertical">
          <div class="group-item">♣</div>
          <div class="group-item">♣</div>
        </div>
      </div>
      <div class="right flipped">
        <div class="group">
          <div class="group-item">2</div>
          <div class="group-item">♣</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="left">
        <div class="group">
          <div class="group-item">3</div>
          <div class="group-item">♠</div>
        </div>
      </div>
      <div class="middle">
        <div class="group-vertical">
          <div class="group-item">♠</div>
          <div class="group-item">♠</div>
          <div class="group-item">♠</div>
        </div>
      </div>
      <div class="right flipped">
        <div class="group">
          <div class="group-item">3</div>
          <div class="group-item">♠</div>
        </div>
      </div>
    </div>
    <div class="card red">
      <div class="left">
        <div class="group">
          <div class="group-item">4</div>
          <div class="group-item">♥</div>
        </div>
      </div>
      <div class="middle">
        <div class="group-vertical">
          <div class="group-horizontal">
            <div class="group-item">♥</div>
            <div class="group-item">♥</div>
          </div>
          <div class="group-horizontal flipped">
            <div class="group-item">♥</div>
            <div class="group-item">♥</div>
          </div>
        </div>
      </div>
      <div class="right flipped">
        <div class="group">
          <div class="group-item">4</div>
          <div class="group-item">♥</div>
        </div>
      </div>
    </div>
    <div class="card red">
      <div class="left">
        <div class="group">
          <div class="group-item">5</div>
          <div class="group-item">♦</div>
        </div>
      </div>
      <div class="middle">
        <div class="group-vertical">
          <div class="group-horizontal">
            <div class="group-item">♦</div>
            <div class="group-item">♦</div>
          </div>
          <div class="group-horizontal">
            <div class="group-item">♦</div>
          </div>
          <div class="group-horizontal flipped">
            <div class="group-item">♦</div>
            <div class="group-item">♦</div>
          </div>
        </div>
      </div>
      <div class="right flipped">
        <div class="group">
          <div class="group-item">5</div>
          <div class="group-item">♦</div>
        </div>
      </div>
    </div>
  </main>

</body>

</html>
