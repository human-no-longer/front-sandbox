<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="blog-post-card">
    <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="Human hands typing text on a laptop">
    <div class="post-content">
      <h2 class="post-title">How to be "an elefant" in human society</h2>
      <p class="post-excerpt">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quam repudiandae quaerat ab perferendis. Dolor, soluta?</p>
      <a class="read-more" href="#">Read More</a>
    </div>
  </div>

</body>

</html>
